<body>

<div class="temeria-public-root" style="position:relative;max-width:1200px;margin:auto;padding-top:30px;">
  <div class="temeria-card" style="
    position:relative;
    padding:30px;
    border-radius:26px;
    background:linear-gradient(135deg,#070a12,#7fffd9,#b06cff);
    color:#eafcff;
    max-width:760px;
    min-height:auto;
    width:92%;
    margin:auto;
    box-sizing:border-box;
    text-align:center;
    overflow:visible;
    isolation:isolate;
   box-shadow:
0 0 25px rgba(0,0,0,.45),

0 0 35px #00f6ff,
0 0 75px #b06cff,
0 0 140px #6cff9f,

inset 0 0 25px rgba(255,255,255,.04);
    
  ">
    
    
    <h1 style="
font-size:34px;
margin-bottom:20px;
font-family:Orbitron,Arial,sans-serif;
letter-spacing:2px;
color:#00f6ff;
text-shadow:0 0 20px #00f6ff,0 0 55px #b06cff;
">

</h1>

<div style="
font-size:22px;
line-height:1.7;
max-width:700px;
margin:auto;

letter-spacing:normal;
text-shadow:none;
font-family:Orbitron,Arial,sans-serif;
">

</div>

    
    
    
    
    
<img src="https://alexcreativesite.github.io/Temeria-Media-Suite/assets/thumb/default.jpg" alt="" loading="eager" fetchpriority="high" decoding="async" style="
width:100%;height:auto;border-radius:22px;margin-top:25px;display:block;object-fit:contain;
box-shadow:0 0 35px rgba(0,0,0,.35),0 0 35px #b06cff55;
">
    
    
    
<div style="margin-top:25px;text-align:center;">

<button
type="button"
onclick="TemeriaPublicPlayer.copy('https://alexcreativesite.github.io/Temeria-Media-Suite/cards/temeria-card-1779819184713.html')"

style="
padding:16px 34px;
border:none;
cursor:pointer;
border-radius:999px;
background:linear-gradient(90deg,#00f6ff,#b06cff);
color:white;
font-size:18px;
font-weight:bold;
box-shadow:0 0 35px rgba(176,108,255,.28);
">

🔗 COPIA LINK

</button>

</div>
  </div>
</div>

<script>
window.TemeriaPublicPlayer =
window.TemeriaPublicPlayer || {

  yt:function(id,action){
    var iframe = document.getElementById(id);
    if(!iframe || !iframe.contentWindow) return;

    iframe.contentWindow.postMessage(
      JSON.stringify({event:"command",func:action,args:[]}),
      "*"
    );
  },

  mp3:function(id,action){
    var audio = document.getElementById(id);
    if(!audio) return;

    if(action === "play"){
      audio.play().catch(function(){
        alert("Premi PLAY di nuovo: il browser ha bloccato l'audio.");
      });
    }

    if(action === "stop"){
      audio.pause();
      audio.currentTime = 0;
    }
  },

  video:function(id,action){
    var video = document.getElementById(id);
    if(!video) return;

    if(action === "play"){
      video.play().catch(function(){
        alert("Premi PLAY di nuovo: il browser ha bloccato il video.");
      });
    }

    if(action === "stop"){
      video.pause();
      video.currentTime = 0;
    }
  },

  enableHiddenAudio:function(id,btn){
    var video = document.getElementById(id);
    if(!video) return;

    video.muted = false;
    video.volume = 1;

    video.play()
    .then(function(){
      if(btn){
        btn.innerHTML = "🎵 Musica attiva";
        btn.style.opacity = ".75";
      }
    })
    .catch(function(){
      alert("Il browser richiede un secondo tocco per attivare l'audio.");
    });
  },

  copy:function(text){
    if(navigator.clipboard){
      navigator.clipboard.writeText(text);
    }
  }
};

setTimeout(function(){
  var safeVideos = document.querySelectorAll(".temeria-hidden-autoplay");

  safeVideos.forEach(function(v){
    v.muted = true;
    v.volume = 0;

    var p = v.play();

    if(p){
      p.catch(function(err){
        console.log("TEMERIA SAFE AUTOPLAY BLOCK", err);
      });
    }
  });
},800);
</script>
</body>
